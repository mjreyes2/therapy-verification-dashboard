<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBTA Central Referral Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes glow {
            0% { border-color: #6366f1; box-shadow: 0 0 5px #6366f1; }
            50% { border-color: #a5b4fc; box-shadow: 0 0 20px #6366f1; }
            100% { border-color: #6366f1; box-shadow: 0 0 5px #6366f1; }
        }
        .glowing-card { animation: glow 2s infinite; border-width: 3px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069";
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({});

          const loadData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(SCRIPT_URL);
              const result = await response.json();
              setData(result);
            } catch (e) { console.error(e); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const sortedData = useMemo(() => {
            const filtered = data.filter(g => 
              (g.groupName || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
              (g.therapist || "").toLowerCase().includes(lowerTerm) ||
              (g.keywords || "").toLowerCase().includes(searchTerm.toLowerCase())
            );
            // Sort: Unviewed first, then Pending, then Verified
            return [...filtered].sort((a, b) => {
                if (String(a.viewed) === 'false' && String(b.viewed) !== 'false') return -1;
                if (String(a.viewed) !== 'false' && String(b.viewed) === 'false') return 1;
                return 0;
            });
          }, [data, searchTerm]);

          const updateGroupInCloud = async (group, action = "edit") => {
            setIsSaving(true);
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action, data: group }) });
            await loadData();
            setIsSaving(false);
          };

          const handleMarkViewed = (group) => {
            if (String(group.viewed) === 'false') {
                updateGroupInCloud({ ...group, viewed: "true" });
            }
          };

          const handleToggleOutreach = (group) => {
            const date = group.lastContacted ? "" : new Date().toLocaleDateString();
            updateGroupInCloud({ ...group, lastContacted: date });
          };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                <form onSubmit={(e) => { e.preventDefault(); if(pinInput === CORRECT_PIN) { setIsAuthenticated(true); sessionStorage.setItem('tbta_auth', 'true'); } }} className="bg-white p-8 rounded shadow-xl w-full max-w-sm">
                  <h2 className="text-center font-bold mb-4 text-indigo-800">TBTA Security</h2>
                  <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full p-3 border rounded text-center text-2xl" placeholder="••••" maxLength="4" autoFocus />
                  <button className="w-full bg-indigo-600 text-white p-3 rounded mt-4 font-bold">Access System</button>
                </form>
              </div>
            );
          }

          return (
            <div className="max-w-5xl mx-auto p-4 sm:p-8">
              {isSaving && <div className="fixed inset-0 bg-white/60 z-50 flex items-center justify-center font-black text-indigo-600">CLOUD SYNC IN PROGRESS...</div>}
              
              <div className="flex justify-between items-center mb-8">
                <h1 className="text-2xl font-black text-indigo-900">REFERRAL TRIAGE</h1>
                <button onClick={() => { setCurrentGroup({groupName:"", therapist:"", county:"Pinellas", email:"[Awaiting Response]", status:"Pending", viewed:"false"}); setShowAddForm(true); }} className="bg-indigo-600 text-white px-6 py-3 rounded-full font-bold shadow-lg hover:bg-indigo-700">+ NEW LEAD</button>
              </div>

              <input type="text" placeholder="Search trauma, teens, Spanish..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-5 border-2 border-indigo-100 rounded-2xl shadow-inner mb-8 text-lg focus:border-indigo-500 outline-none" />

              <div className="grid gap-6">
                {sortedData.map(group => {
                  const isNew = String(group.viewed) === 'false';
                  const contacted = !!group.lastContacted;

                  return (
                    <div 
                        key={group.id} 
                        onClick={() => handleMarkViewed(group)}
                        className={`bg-white p-6 rounded-2xl border-2 transition-all cursor-pointer relative ${isNew ? 'glowing-card' : 'border-slate-200'} ${contacted ? 'bg-emerald-50/50' : ''}`}
                    >
                      <div className="flex flex-col sm:flex-row justify-between gap-4">
                        <div className="flex-1">
                          <div className="flex items-center gap-3 mb-2">
                             {isNew && <span className="bg-indigo-600 text-white text-[10px] px-2 py-1 rounded-full font-black animate-pulse">NEW LEAD</span>}
                             <h3 className="text-xl font-black text-slate-800">{group.groupName}</h3>
                          </div>
                          <p className="font-bold text-indigo-600 mb-4">{group.therapist}</p>
                          
                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-sm text-slate-500">
                             <p><i className="fas fa-envelope mr-2"></i>{group.email}</p>
                             <p><i className="fas fa-map-marker-alt mr-2"></i>{group.county}</p>
                             <p><i className="fas fa-info-circle mr-2"></i>Status: <span className="font-bold text-slate-800">{group.status}</span></p>
                          </div>
                        </div>

                        <div className="flex sm:flex-col justify-end gap-2 border-t sm:border-t-0 pt-4 sm:pt-0">
                           <button 
                             onClick={(e) => { e.stopPropagation(); handleToggleOutreach(group); }} 
                             className={`px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all ${contacted ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-indigo-100'}`}
                           >
                             <i className={`fas ${contacted ? 'fa-check-double' : 'fa-paper-plane'}`}></i>
                             {contacted ? `Outreach Sent (${group.lastContacted})` : 'Mark Outreach Sent'}
                           </button>
                           <button onClick={(e) => { e.stopPropagation(); setCurrentGroup(group); setShowEditForm(true); }} className="p-2 text-slate-400 hover:text-indigo-600 text-center"><i className="fas fa-edit mr-2"></i>Edit Full Info</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* FORMS REMAIN SAME AS BEFORE BUT WITH ALL FIELDS */}
              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4">
                  <div className="bg-white p-8 rounded-3xl w-full max-w-xl shadow-2xl">
                    <h2 className="text-2xl font-black mb-6">{showEditForm ? 'Edit Lead' : 'Add Lead'}</h2>
                    <form onSubmit={e => handleSaveSubmit(e, showEditForm ? 'edit' : 'add')} className="space-y-4">
                        <input className="w-full p-3 border rounded-xl" placeholder="Group Name" value={currentGroup.groupName} onChange={e => setCurrentGroup({...currentGroup, groupName:e.target.value})} />
                        <input className="w-full p-3 border rounded-xl" placeholder="Therapist" value={currentGroup.therapist} onChange={e => setCurrentGroup({...currentGroup, therapist:e.target.value})} />
                        <input className="w-full p-3 border-2 border-indigo-200 rounded-xl" placeholder="Email" value={currentGroup.email} onChange={e => setCurrentGroup({...currentGroup, email:e.target.value})} />
                        <div className="grid grid-cols-2 gap-4">
                            <select className="p-3 border rounded-xl" value={currentGroup.status} onChange={e => setCurrentGroup({...currentGroup, status:e.target.value})}><option>Pending</option><option>Verified</option></select>
                            <input className="p-3 border rounded-xl" placeholder="County" value={currentGroup.county} onChange={e => setCurrentGroup({...currentGroup, county:e.target.value})} />
                        </div>
                        <div className="flex gap-4 pt-6">
                            <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="flex-1 p-3 font-bold text-slate-400">Cancel</button>
                            <button className="flex-1 bg-indigo-600 text-white p-3 rounded-xl font-bold">Save Changes</button>
                        </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
