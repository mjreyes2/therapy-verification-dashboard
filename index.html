<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>TBTA Therapist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "1234"; 
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [pinError, setPinError] = useState(false);
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");

          const loadData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(SCRIPT_URL);
              const result = await response.json();
              setData(result);
            } catch (error) { console.error(error); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const [checkedOffIds, setCheckedOffIds] = useState([]);
          const [expandedGroupId, setExpandedGroupId] = useState(null);
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({});

          const openAddForm = () => {
            setCurrentGroup({ id: null, groupName: "", therapist: "", county: "Pinellas", modality: "In-Person", type: "Open", email: "[Awaiting Response]", cost: "", schedule: "", keywords: "", language: "English", status: "Pending" });
            setShowAddForm(true);
          };

          const openEditForm = (group) => {
            setCurrentGroup({...group});
            setShowEditForm(true);
          };

          const handleSaveSubmit = async (e, actionType) => {
            e.preventDefault();
            setIsSaving(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: actionType, data: currentGroup }) });
              await loadData();
              setShowAddForm(false);
              setShowEditForm(false);
            } catch (error) { alert("Save failed."); }
            setIsSaving(false);
          };

          const handleDelete = async (id) => {
            if (!window.confirm("Delete this entry?")) return;
            setIsSaving(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id }) });
              await loadData();
            } catch (error) { alert("Delete failed."); }
            setIsSaving(false);
          };

          const filteredData = useMemo(() => {
            const lower = searchTerm.toLowerCase();
            return data.filter(g => 
              (g.groupName || "").toLowerCase().includes(lower) || 
              (g.therapist || "").toLowerCase().includes(lower) ||
              (g.keywords || "").toLowerCase().includes(lower) ||
              (g.email || "").toLowerCase().includes(lower)
            );
          }, [data, searchTerm]);

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                <form onSubmit={(e) => { e.preventDefault(); if(pinInput === CORRECT_PIN) { setIsAuthenticated(true); sessionStorage.setItem('tbta_auth', 'true'); } else setPinError(true); }} className="bg-white p-8 rounded shadow-lg w-full max-w-sm">
                  <h2 className="text-center font-bold mb-4">Secure Access</h2>
                  <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full p-2 border mb-4 text-center text-xl" placeholder="PIN" />
                  <button className="w-full bg-indigo-600 text-white p-2 rounded">Enter</button>
                </form>
              </div>
            );
          }

          return (
            <div className="max-w-4xl mx-auto p-4">
              {isSaving && <div className="fixed inset-0 bg-white/80 z-50 flex items-center justify-center font-bold">Saving to Database...</div>}
              
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-xl font-bold text-indigo-800">TBTA Referral Dashboard</h1>
                <button onClick={openAddForm} className="bg-indigo-600 text-white px-4 py-2 rounded">+ Add Group</button>
              </div>

              <input type="text" placeholder="Search by name, trauma, teens, etc..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-4 border rounded shadow-sm mb-6" />

              <div className="space-y-4">
                {filteredData.map(group => {
                  const isAwaiting = group.email === "[Awaiting Response]";
                  return (
                    <div key={group.id} className="bg-white p-5 border rounded shadow-sm relative border-l-4" style={{borderLeftColor: isAwaiting ? '#f59e0b' : '#6366f1'}}>
                      <div className="absolute top-4 right-4 flex gap-4">
                        <button onClick={() => openEditForm(group)} className="text-gray-400 hover:text-indigo-600"><i className="fas fa-edit"></i></button>
                        <button onClick={() => handleDelete(group.id)} className="text-gray-400 hover:text-red-500"><i className="fas fa-trash"></i></button>
                      </div>
                      
                      <div className="mb-2">
                        <h3 className="text-lg font-bold">{group.groupName}</h3>
                        <p className="text-sm font-semibold text-gray-700">{group.therapist}</p>
                      </div>

                      <div className="text-sm text-gray-600 grid grid-cols-2 gap-2">
                        <p><strong>Location:</strong> {group.county}</p>
                        <p><strong>Type:</strong> {group.type}</p>
                        <p className={isAwaiting ? "text-amber-600 font-bold" : ""}>
                          <strong>Email:</strong> {group.email} 
                          {isAwaiting && <span className="ml-2 italic text-xs underline">(Manual Update Needed)</span>}
                        </p>
                        <p><strong>Status:</strong> {group.status}</p>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* EDIT FORM MODAL */}
              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                  <div className="bg-white p-6 rounded-lg w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
                    <h2 className="font-bold text-xl mb-4">{showEditForm ? "Update Group Details" : "Add New Group"}</h2>
                    <form onSubmit={e => handleSaveSubmit(e, showEditForm ? 'edit' : 'add')} className="space-y-4">
                      <div><label className="block text-sm">Group Name</label><input required className="w-full border p-2 rounded" value={currentGroup.groupName} onChange={e => setCurrentGroup({...currentGroup, groupName: e.target.value})} /></div>
                      <div><label className="block text-sm">Therapist Name</label><input required className="w-full border p-2 rounded" value={currentGroup.therapist} onChange={e => setCurrentGroup({...currentGroup, therapist: e.target.value})} /></div>
                      <div><label className="block text-sm font-bold text-indigo-600">Email Address (Update once they reply!)</label><input className="w-full border-2 border-indigo-200 p-2 rounded" value={currentGroup.email} onChange={e => setCurrentGroup({...currentGroup, email: e.target.value})} /></div>
                      <div className="grid grid-cols-2 gap-4">
                        <div><label className="block text-sm">Status</label><select className="w-full border p-2" value={currentGroup.status} onChange={e => setCurrentGroup({...currentGroup, status: e.target.value})}><option>Pending</option><option>Verified</option></select></div>
                        <div><label className="block text-sm">County</label><input className="w-full border p-2" value={currentGroup.county} onChange={e => setCurrentGroup({...currentGroup, county: e.target.value})} /></div>
                      </div>
                      <div className="flex justify-end gap-2 pt-4">
                        <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="p-2 text-gray-500">Cancel</button>
                        <button className="bg-green-600 text-white px-6 py-2 rounded font-bold">Save to Database</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
