<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tampa Bay Therapist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069"; // YOUR PIN
          
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [pinError, setPinError] = useState(false);
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");

          const loadData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(SCRIPT_URL);
              const result = await response.json();
              setData(result);
            } catch (error) { console.error(error); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const [checkedOffIds, setCheckedOffIds] = useState([]);
          const [expandedGroupId, setExpandedGroupId] = useState(null);
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({});

          const openAddForm = () => {
            setCurrentGroup({ id: null, groupName: "", therapist: "", county: "Pinellas", modality: "In-Person", type: "Open", email: "[Awaiting Response]", cost: "", schedule: "", keywords: "", language: "English", status: "Pending" });
            setShowAddForm(true);
          };

          const openEditForm = (group) => {
            setCurrentGroup({...group});
            setShowEditForm(true);
          };

          const handleSaveSubmit = async (e, actionType) => {
            e.preventDefault();
            setIsSaving(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: actionType, data: currentGroup }) });
              await loadData();
              setShowAddForm(false);
              setShowEditForm(false);
            } catch (error) { alert("Save failed."); }
            setIsSaving(false);
          };

          const handleDelete = async (id) => {
            if (!window.confirm("Delete this entry?")) return;
            setIsSaving(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id }) });
              await loadData();
            } catch (error) { alert("Delete failed."); }
            setIsSaving(false);
          };

          const handleLogin = (e) => {
            e.preventDefault();
            if (pinInput === CORRECT_PIN) {
              setIsAuthenticated(true);
              sessionStorage.setItem('tbta_auth', 'true');
              setPinError(false);
            } else {
              setPinError(true);
              setPinInput("");
            }
          };

          const handleLogout = () => {
            setIsAuthenticated(false);
            sessionStorage.removeItem('tbta_auth');
            setPinInput("");
          };

          const filteredData = useMemo(() => {
            const lower = searchTerm.toLowerCase();
            return data.filter(g => 
              (g.groupName || "").toLowerCase().includes(lower) || 
              (g.therapist || "").toLowerCase().includes(lower) ||
              (g.keywords || "").toLowerCase().includes(lower) ||
              (g.email || "").toLowerCase().includes(lower)
            );
          }, [data, searchTerm]);

          // --- LOGIN SCREEN (RESTORED LOOK) ---
          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-indigo-600">
                  <div className="text-center mb-6">
                    <i className="fas fa-lock text-4xl text-indigo-600 mb-3"></i>
                    <h2 className="text-2xl font-bold text-gray-800">Secure Access</h2>
                    <p className="text-gray-500 text-sm mt-1">Tampa Bay Therapist & Associates Directory</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <input 
                        type="password" 
                        maxLength="4" 
                        autoFocus 
                        value={pinInput} 
                        onChange={(e) => setPinInput(e.target.value)} 
                        className={`w-full px-4 py-3 text-center text-2xl tracking-[0.5em] border rounded-lg focus:outline-none focus:ring-2 ${pinError ? 'border-red-500 focus:ring-red-500' : 'border-gray-300 focus:ring-indigo-500'}`} 
                        placeholder="••••" 
                      />
                      {pinError && <p className="text-red-500 text-sm mt-2 text-center font-medium">Incorrect PIN.</p>}
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200">
                      Access Dashboard
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="relative min-h-screen">
              {isSaving && (
                <div className="fixed inset-0 bg-white bg-opacity-80 z-50 flex flex-col items-center justify-center">
                  <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
                  <h2 className="text-xl font-bold text-gray-800">Syncing with Google Database...</h2>
                </div>
              )}

              <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                  <div>
                    <h1 className="text-2xl font-bold text-indigo-800 flex items-center gap-2">
                      <i className="fas fa-users text-indigo-600"></i>
                      TBTA Dashboard
                    </h1>
                  </div>
                  <button onClick={handleLogout} className="text-sm text-gray-500 hover:text-red-600 font-medium transition-colors">
                    <i className="fas fa-sign-out-alt mr-1"></i> Lock System
                  </button>
                </div>
              </header>

              <main className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                <div className="flex flex-col sm:flex-row gap-4 mb-6">
                  <div className="relative flex-1 shadow-sm">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i className="fas fa-search text-gray-400"></i></div>
                    <input type="text" className="block w-full pl-11 pr-3 py-4 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg" placeholder="Search trauma, teens, virtual..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                  </div>
                  <button onClick={openAddForm} className="px-6 py-4 bg-indigo-800 hover:bg-indigo-900 text-white font-bold rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors cursor-pointer">
                    <i className="fas fa-plus"></i> Add Group
                  </button>
                </div>

                {isLoading ? (
                  <div className="bg-white p-16 rounded-lg text-center shadow-sm">
                    <i className="fas fa-spinner fa-spin text-5xl text-indigo-500 mb-4"></i>
                    <h3 className="text-xl font-bold">Fetching live database...</h3>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {filteredData.map(group => {
                      const isAwaiting = group.email === "[Awaiting Response]";
                      return (
                        <div key={group.id} className={`bg-white rounded-lg border-2 shadow-sm transition-all relative border-gray-200 hover:border-indigo-300 border-l-8`} style={{borderLeftColor: isAwaiting ? '#f59e0b' : '#6366f1'}}>
                          <div className="absolute top-4 right-4 flex gap-3 z-10">
                            <button onClick={() => openEditForm(group)} className="text-gray-400 hover:text-indigo-600"><i className="fas fa-edit text-lg"></i></button>
                            <button onClick={() => handleDelete(group.id)} className="text-gray-400 hover:text-red-500"><i className="fas fa-trash-alt text-lg"></i></button>
                          </div>
                          <div className="p-5 pr-20">
                            <h3 className="text-xl font-bold mb-1">{group.groupName}</h3>
                            <p className="text-gray-600 font-medium">Provider: <span className="text-gray-900 font-bold">{group.therapist}</span></p>
                            <div className="flex flex-wrap items-center gap-4 mt-3 text-sm text-gray-600">
                              <span><i className="fas fa-map-marker-alt mr-1"></i> {group.county}</span>
                              <span className={isAwaiting ? "text-amber-600 font-bold bg-amber-50 px-2 py-0.5 rounded" : ""}><i className="fas fa-envelope mr-1"></i> {group.email}</span>
                              <span className="bg-gray-100 px-2 py-0.5 rounded font-bold text-gray-700">{group.status}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </main>

              {/* REUSABLE FORM MODAL */}
              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                      <h2 className="text-2xl font-bold text-gray-800">{showEditForm ? 'Edit Group' : 'Add New Group'}</h2>
                      <button onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
                    </div>
                    <form onSubmit={(e) => handleSaveSubmit(e, showEditForm ? 'edit' : 'add')} className="space-y-4">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div className="sm:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Group Name *</label><input required type="text" value={currentGroup.groupName} onChange={e => setCurrentGroup({...currentGroup, groupName: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500" /></div>
                        <div><label className="block text-sm font-medium text-gray-700 mb-1">Therapist/Provider *</label><input required type="text" value={currentGroup.therapist} onChange={e => setCurrentGroup({...currentGroup, therapist: e.target.value})} className="w-full p-2 border border-gray-300 rounded" /></div>
                        <div><label className="block text-sm font-medium text-indigo-600 mb-1 font-bold">Email (Update when they reply!)</label><input type="text" value={currentGroup.email} onChange={e => setCurrentGroup({...currentGroup, email: e.target.value})} className="w-full p-2 border-2 border-indigo-200 rounded" /></div>
                        <div><label className="block text-sm font-medium text-gray-700 mb-1">Status</label><select value={currentGroup.status} onChange={e => setCurrentGroup({...currentGroup, status: e.target.value})} className="w-full p-2 border border-gray-300 rounded"><option>Pending</option><option>Verified</option></select></div>
                        <div><label className="block text-sm font-medium text-gray-700 mb-1">County</label><input type="text" value={currentGroup.county} onChange={e => setCurrentGroup({...currentGroup, county: e.target.value})} className="w-full p-2 border border-gray-300 rounded" /></div>
                        <div className="sm:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Keywords (trauma, teens, etc.)</label><input type="text" value={currentGroup.keywords} onChange={e => setCurrentGroup({...currentGroup, keywords: e.target.value})} className="w-full p-2 border border-gray-300 rounded" /></div>
                      </div>
                      <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                        <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="px-4 py-2 bg-gray-200 rounded">Cancel</button>
                        <button type="submit" className="px-6 py-2 bg-green-600 text-white rounded font-bold">Save to Database</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
