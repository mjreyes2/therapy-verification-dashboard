<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tampa Bay Therapist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulseGlow {
            0% { border-color: #6366f1; box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
            50% { border-color: #818cf8; box-shadow: 0 0 20px rgba(99, 102, 241, 0.6); }
            100% { border-color: #6366f1; box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
        }
        .priority-lead { 
            animation: pulseGlow 2s infinite ease-in-out; 
            border-width: 3px !important; 
            background-color: #f8faff !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069"; 
          
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [deleteConfirm, setDeleteConfirm] = useState(null);
          const [currentGroup, setCurrentGroup] = useState({});
          const [expandedId, setExpandedId] = useState(null);
          const [copiedType, setCopiedType] = useState(null);

          const loadData = async () => {
            setIsLoading(true);
            try {
              const res = await fetch(SCRIPT_URL);
              const json = await res.json();
              setData(json);
            } catch (e) { console.error(e); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const formatTampaTime = () => {
            return new Intl.DateTimeFormat('en-US', {
              year: 'numeric', month: 'long', day: 'numeric',
              hour: 'numeric', minute: '2-digit', hour12: true,
              timeZone: 'America/New_York'
            }).format(new Date()).replace(',', '') + ' ET';
          };

          const updateCloud = async (group, action = "edit") => {
            setIsLoading(true);
            try {
              await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ action, data: group, id: group.id }) 
              });
              await loadData();
            } catch (e) { alert("Sync Error"); }
            setIsLoading(false);
          };

          const handleDeleteFinal = async () => {
            const idToDelete = deleteConfirm.id;
            setDeleteConfirm(null);
            setIsLoading(true);
            try {
              await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: "delete", id: idToDelete }) 
              });
              await loadData();
            } catch (e) { alert("Delete Error"); }
            setIsLoading(false);
          };

          const handleLogout = () => {
            setIsAuthenticated(false);
            sessionStorage.removeItem('tbta_auth');
            setPinInput(""); // THIS FIXES THE SECURITY ISSUE
          };

          const handleCopy = (text, type) => {
            navigator.clipboard.writeText(text);
            setCopiedType(type);
            setTimeout(() => setCopiedType(null), 2000);
          };

          const getEmailDraft = (g) => {
            const firstName = g.therapist ? g.therapist.split(' ')[0] : "Provider";
            return `Hello ${firstName},\n\nMy name is Marvin, I am a local mental health therapist working for Tampa Bay Therapist and Associates.\n\nI am looking to inquire about your group: ${g.groupName}. Are you currently accepting new clients for referrals to this group?\n\nCould you also please confirm if this is an open or closed group, and if there are any updates to your schedule or fees?\n\nThank you,\nMarvin`;
          };

          const processedData = useMemo(() => {
            const filtered = data.filter(g => 
              (g.groupName || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
              (g.therapist || "").toLowerCase().includes(searchTerm.toLowerCase())
            );
            return [...filtered].sort((a, b) => {
                const aNew = !a.viewed || String(a.viewed).toLowerCase() === 'false';
                const bNew = !b.viewed || String(b.viewed).toLowerCase() === 'false';
                if (aNew && !bNew) return -1;
                if (!aNew && bNew) return 1;
                return 0;
            });
          }, [data, searchTerm]);

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-indigo-600">
                  <div className="text-center mb-6">
                    <i className="fas fa-lock text-4xl text-indigo-600 mb-3"></i>
                    <h2 className="text-2xl font-bold text-gray-800 uppercase tracking-tighter">Secure Access</h2>
                    <p className="text-gray-500 text-sm mt-1">Tampa Bay Therapist & Associates</p>
                  </div>
                  <form onSubmit={(e) => { e.preventDefault(); if(pinInput === CORRECT_PIN) { setIsAuthenticated(true); sessionStorage.setItem('tbta_auth', 'true'); } else { alert("Wrong PIN"); setPinInput(""); } }} className="space-y-6">
                    <input type="password" maxLength="4" autoFocus value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full p-4 text-center text-3xl tracking-widest border rounded-lg focus:border-indigo-500 outline-none" placeholder="••••" />
                    <button className="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Access Dashboard</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="relative min-h-screen">
              {isLoading && (
                <div className="fixed inset-0 bg-white/80 z-[100] flex flex-col items-center justify-center font-black text-indigo-600">
                  <i className="fas fa-circle-notch fa-spin text-6xl mb-4"></i>
                  <span className="text-xl tracking-widest uppercase text-center px-4">Syncing Cloud Database...</span>
                </div>
              )}

              <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                  <div>
                    <h1 className="text-2xl font-bold text-indigo-800 flex items-center gap-2">
                        <i className="fas fa-users text-indigo-600"></i> Tampa Bay Therapist & Associates
                    </h1>
                    <p className="text-sm text-gray-500 font-medium flex items-center gap-2 uppercase tracking-wide">
                      Referral Triage <span className="text-green-500 text-xs font-bold"><i className="fas fa-circle animate-pulse"></i> Sync: Live</span>
                    </p>
                  </div>
                  <button onClick={handleLogout} className="text-sm text-gray-400 hover:text-red-600 font-bold"><i className="fas fa-sign-out-alt mr-1"></i> Lock</button>
                </div>
              </header>

              <main className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                <div className="flex flex-col sm:flex-row gap-4 mb-8">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className="fas fa-search"></i></div>
                    <input type="text" className="block w-full pl-11 pr-3 py-4 border-2 border-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg shadow-sm" placeholder="Search trauma, teens, virtual..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                  </div>
                  <button onClick={() => { setCurrentGroup({groupName:"", therapist:"", email:"[Awaiting Response]", viewed:"false", status:"Pending"}); setShowAddForm(true); }} className="px-6 py-4 bg-indigo-800 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-900">+ NEW LEAD</button>
                </div>

                <div className="space-y-6">
                  {processedData.map(group => {
                    const isNew = !group.viewed || String(group.viewed).toLowerCase() === 'false';
                    const isExpanded = expandedId === group.id;
                    const isContacted = !!group.lastContacted;

                    return (
                      <div key={group.id} className={`bg-white rounded-2xl border-2 transition-all relative ${isNew ? 'priority-lead' : 'border-gray-200'} ${isContacted ? 'bg-emerald-50/30 border-emerald-100' : ''}`}>
                        <div className="p-6 cursor-pointer" onClick={() => { setExpandedId(isExpanded ? null : group.id); if(isNew) updateCloud({...group, viewed:"true"}); }}>
                          <div className="flex justify-between items-start pr-12">
                            <div>
                              <div className="flex items-center gap-2 mb-1">
                                  {isNew && <span className="bg-indigo-600 text-white text-[8px] px-2 py-0.5 rounded font-black uppercase">Action Needed</span>}
                                  <h3 className="text-xl font-bold text-gray-900">{group.groupName}</h3>
                              </div>
                              <p className="text-indigo-600 font-bold">{group.therapist}</p>
                            </div>
                            <div className="flex gap-4">
                              <button onClick={(e) => {e.stopPropagation(); setCurrentGroup(group); setShowEditForm(true);}} className="text-gray-300 hover:text-indigo-600"><i className="fas fa-edit text-lg"></i></button>
                              <button onClick={(e) => {e.stopPropagation(); setDeleteConfirm(group);}} className="text-gray-300 hover:text-red-500"><i className="fas fa-trash-alt text-lg"></i></button>
                            </div>
                          </div>

                          {isExpanded && (
                            <div className="mt-6 pt-6 border-t border-gray-100 space-y-6">
                              <div className="grid grid-cols-2 gap-4 text-sm text-gray-600">
                                  <p><strong>County:</strong> {group.county}</p>
                                  <p><strong>Status:</strong> {group.status}</p>
                                  <p><strong>Last Contact:</strong> {group.lastContacted || "Never"}</p>
                                  <p><strong>Phone:</strong> {group.phone || "---"}</p>
                              </div>

                              <div className="bg-gray-50 p-4 rounded-xl space-y-4">
                                  <h4 className="text-xs font-black uppercase text-gray-400 tracking-widest text-center font-bold">Verification Outreach</h4>
                                  <div>
                                      <label className="text-[10px] font-bold text-indigo-600 uppercase">Direct Email</label>
                                      <div className="flex gap-2">
                                          <input readOnly value={group.email} className="flex-1 bg-white border p-2 rounded text-sm font-bold" />
                                          <button onClick={(e) => {e.stopPropagation(); handleCopy(group.email, 'email-'+group.id);}} className="bg-indigo-100 text-indigo-700 px-3 rounded font-bold text-xs">{copiedType === 'email-'+group.id ? 'Copied!' : 'Copy'}</button>
                                      </div>
                                  </div>
                                  <div>
                                      <label className="text-[10px] font-bold text-indigo-600 uppercase">Message Body</label>
                                      <textarea readOnly value={getEmailDraft(group)} className="w-full bg-white border p-2 rounded text-xs h-32 resize-none leading-relaxed" />
                                      <button onClick={(e) => {e.stopPropagation(); handleCopy(getEmailDraft(group), 'msg-'+group.id);}} className="w-full mt-2 bg-indigo-600 text-white py-2 rounded font-bold text-xs">{copiedType === 'msg-'+group.id ? 'Draft Copied!' : 'Copy Message Draft'}</button>
                                  </div>
                                  <button onClick={(e) => {e.stopPropagation(); updateCloud({...group, lastContacted: formatTampaTime()}); }} className="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-emerald-700 transition">Mark Outreach Sent & Saved</button>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </main>

              {deleteConfirm && (
                <div className="fixed inset-0 bg-slate-900/80 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
                    <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i className="fas fa-exclamation-triangle"></i>
                    </div>
                    <h2 className="text-xl font-black text-slate-800 mb-2">Confirm Delete</h2>
                    <p className="text-sm text-slate-500 mb-8 leading-relaxed">
                        Are you sure you want to permanently delete <span className="font-bold text-slate-800">"{deleteConfirm.groupName}"</span>? This cannot be undone.
                    </p>
                    <div className="flex gap-4">
                        <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-3 font-bold text-slate-400 bg-slate-50 rounded-xl hover:bg-slate-100">Cancel</button>
                        <button onClick={handleDeleteFinal} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg hover:bg-red-700">Yes, Delete</button>
                    </div>
                  </div>
                </div>
              )}

              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-slate-900/60 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
                    <h2 className="text-xl font-black mb-6 uppercase text-indigo-900">{showEditForm ? 'Edit Lead' : 'Add New Lead'}</h2>
                    <form onSubmit={e => {e.preventDefault(); updateCloud(currentGroup, showEditForm ? 'edit' : 'add'); setShowAddForm(false); setShowEditForm(false);}} className="space-y-4">
                        <input className="w-full p-4 bg-slate-50 rounded-xl shadow-inner border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Group Name" value={currentGroup.groupName || ""} onChange={e => setCurrentGroup({...currentGroup, groupName:e.target.value})} required />
                        <input className="w-full p-4 bg-slate-50 rounded-xl shadow-inner border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Therapist" value={currentGroup.therapist || ""} onChange={e => setCurrentGroup({...currentGroup, therapist:e.target.value})} required />
                        <input className="w-full p-4 border-2 border-indigo-100 rounded-xl font-bold text-indigo-700 outline-none" placeholder="Direct Email" value={currentGroup.email || ""} onChange={e => setCurrentGroup({...currentGroup, email:e.target.value})} />
                        <input className="w-full p-4 bg-slate-50 rounded-xl shadow-inner border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Direct Phone" value={currentGroup.phone || ""} onChange={e => setCurrentGroup({...currentGroup, phone:e.target.value})} />
                        <div className="grid grid-cols-2 gap-4">
                            <select className="p-4 bg-slate-50 rounded-xl font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500" value={currentGroup.status || "Pending"} onChange={e => setCurrentGroup({...currentGroup, status:e.target.value})}><option>Pending</option><option>Verified</option></select>
                            <input className="p-4 bg-slate-50 rounded-xl shadow-inner border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="County" value={currentGroup.county || ""} onChange={e => setCurrentGroup({...currentGroup, county:e.target.value})} />
                        </div>
                        <div className="flex gap-4 pt-4">
                            <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="flex-1 font-bold text-slate-400">Cancel</button>
                            <button type="submit" className="flex-1 bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg">Save Lead</button>
                        </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
