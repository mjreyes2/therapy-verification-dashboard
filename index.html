<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tampa Bay Therapist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes glow {
            0% { border-color: #6366f1; box-shadow: 0 0 5px rgba(99, 102, 241, 0.4); }
            50% { border-color: #818cf8; box-shadow: 0 0 20px rgba(99, 102, 241, 0.8); }
            100% { border-color: #6366f1; box-shadow: 0 0 5px rgba(99, 102, 241, 0.4); }
        }
        .glowing-card { animation: glow 2.5s infinite; border-width: 3px !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069"; // YOUR PIN
          
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [pinError, setPinError] = useState(false);
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({});
          const [expandedGroupId, setExpandedGroupId] = useState(null);
          const [copiedEmailId, setCopiedEmailId] = useState(null);
          const [copiedMessageId, setCopiedMessageId] = useState(null);

          const loadData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(SCRIPT_URL);
              const result = await response.json();
              setData(result);
            } catch (error) { console.error(error); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const updateGroupInCloud = async (group, action = "edit") => {
            setIsSaving(true);
            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action, data: group }) });
                await loadData();
            } catch (e) { alert("Cloud sync failed."); }
            setIsSaving(false);
          };

          const filteredAndSortedData = useMemo(() => {
            const filtered = data.filter(g => 
              (g.groupName || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
              (g.therapist || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
              (g.keywords || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
              (g.language || "").toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            return [...filtered].sort((a, b) => {
                const aNew = String(a.viewed).toLowerCase() === 'false';
                const bNew = String(b.viewed).toLowerCase() === 'false';
                if (aNew && !bNew) return -1;
                if (!aNew && bNew) return 1;
                return 0;
            });
          }, [data, searchTerm]);

          const handleLogin = (e) => {
            e.preventDefault();
            if (pinInput === CORRECT_PIN) {
              setIsAuthenticated(true);
              sessionStorage.setItem('tbta_auth', 'true');
            } else { setPinError(true); setPinInput(""); }
          };

          const toggleExpand = (group) => {
            if (expandedGroupId === group.id) {
                setExpandedGroupId(null);
            } else {
                setExpandedGroupId(group.id);
                if (String(group.viewed).toLowerCase() === 'false') {
                    updateGroupInCloud({ ...group, viewed: "true" });
                }
            }
          };

          const handleMarkEmailed = (group) => {
            const dateStr = new Date().toLocaleDateString();
            updateGroupInCloud({ ...group, lastContacted: dateStr, viewed: "true" });
            setExpandedGroupId(null);
          };

          const copyToClipboard = (text, type, id) => {
            navigator.clipboard.writeText(text);
            if (type === 'email') { setCopiedEmailId(id); setTimeout(() => setCopiedEmailId(null), 2000); } 
            else { setCopiedMessageId(id); setTimeout(() => setCopiedMessageId(null), 2000); }
          };

          const getMessageTemplate = (therapistName, groupName) => {
            const nameStr = therapistName ? therapistName.split(',')[0].trim() : "Provider"; 
            return `Hello ${nameStr},\n\nMy name is Marvin, I am a local mental health therapist working for Tampa Bay Therapist and Associates.\n\nI am looking to inquire about your group: ${groupName}. Are you currently accepting new clients for referrals to this group?\n\nCould you also please confirm if this is an open or closed group, and if there are any updates to your schedule or fees?\n\nThank you,\nMarvin`;
          };

          const emailedCount = data.filter(g => !!g.lastContacted).length;
          const progressPercentage = data.length > 0 ? Math.round((emailedCount / data.length) * 100) : 0;

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-indigo-600">
                  <div className="text-center mb-6">
                    <i className="fas fa-lock text-4xl text-indigo-600 mb-3"></i>
                    <h2 className="text-2xl font-bold text-gray-800">Secure Access</h2>
                    <p className="text-gray-500 text-sm mt-1">Tampa Bay Therapist & Associates</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <input type="password" maxLength="4" autoFocus value={pinInput} onChange={e => setPinInput(e.target.value)} className={`w-full px-4 py-3 text-center text-2xl tracking-[0.5em] border rounded-lg focus:outline-none focus:ring-2 ${pinError ? 'border-red-500' : 'border-gray-300'}`} placeholder="••••" />
                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition duration-200">Access Dashboard</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="relative min-h-screen">
              {isSaving && <div className="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center font-black text-indigo-600"><i className="fas fa-sync fa-spin text-4xl mb-2"></i>SYNCING CLOUD...</div>}

              <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                  <div>
                    <h1 className="text-2xl font-bold text-indigo-800 flex items-center gap-2">
                        <i className="fas fa-users text-indigo-600"></i> Tampa Bay Therapist & Associates
                    </h1>
                    <p className="text-sm text-gray-500 font-medium flex items-center gap-2">
                      Referral Triage <span className="text-green-500 text-xs font-bold"><i className="fas fa-circle animate-pulse"></i> Sync: Live</span>
                    </p>
                  </div>
                  <button onClick={() => {setIsAuthenticated(false); sessionStorage.clear();}} className="text-sm text-gray-400 hover:text-red-600 font-bold"><i className="fas fa-sign-out-alt mr-1"></i> Lock</button>
                </div>
              </header>

              <main className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                {/* PROGRESS TRACKER */}
                <div className="bg-white rounded-lg shadow-md border border-gray-200 p-6 mb-8">
                  <div className="flex justify-between items-end mb-2">
                    <div>
                      <h2 className="text-lg font-bold text-gray-800">Monthly Email Progress</h2>
                      <p className="text-sm text-gray-500">Global tracking for all devices</p>
                    </div>
                    <div className="text-2xl font-black text-indigo-600">{emailedCount} / {data.length}</div>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-4">
                    <div className="bg-indigo-600 h-4 rounded-full transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
                  </div>
                </div>

                <div className="flex flex-col sm:flex-row gap-4 mb-8">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i className="fas fa-search"></i></div>
                    <input type="text" className="block w-full pl-11 pr-3 py-4 border-2 border-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg shadow-sm" placeholder="Search trauma, teens, Spanish..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                  </div>
                  <button onClick={() => { setCurrentGroup({groupName:"", therapist:"", county:"Pinellas", email:"[Awaiting Response]", status:"Pending", viewed:"false"}); setShowAddForm(true); }} className="px-6 py-4 bg-indigo-800 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-900">+ NEW LEAD</button>
                </div>

                {isLoading ? (
                  <div className="text-center p-20"><i className="fas fa-spinner fa-spin text-5xl text-indigo-200"></i></div>
                ) : (
                  <div className="space-y-6">
                    {filteredAndSortedData.map(group => {
                      const isNew = String(group.viewed).toLowerCase() === 'false';
                      const isEmailed = !!group.lastContacted;
                      const isExpanded = expandedGroupId === group.id;
                      const message = getMessageTemplate(group.therapist, group.groupName);

                      return (
                        <div key={group.id} className={`bg-white rounded-2xl border-2 transition-all relative ${isNew ? 'glowing-card border-indigo-400 shadow-indigo-100' : 'border-gray-200'} ${isEmailed ? 'bg-emerald-50/30 border-emerald-100' : ''}`}>
                          <div className="absolute top-4 right-4 flex gap-4 z-10">
                            <button onClick={(e) => {e.stopPropagation(); setCurrentGroup(group); setShowEditForm(true);}} className="text-gray-300 hover:text-indigo-600"><i className="fas fa-edit text-lg"></i></button>
                            <button onClick={(e) => {e.stopPropagation(); if(confirm("Delete?")) updateGroupInCloud(group, "delete");}} className="text-gray-300 hover:text-red-500"><i className="fas fa-trash-alt text-lg"></i></button>
                          </div>
                          
                          <div className="p-6">
                            <div className="flex flex-wrap items-center gap-2 mb-1 pr-16">
                                {isNew && <span className="bg-indigo-600 text-white text-[10px] px-2 py-0.5 rounded font-black uppercase tracking-wider animate-pulse">New Lead</span>}
                                {isEmailed && <i className="fas fa-check-circle text-emerald-500"></i>}
                                <h3 className="text-xl font-bold text-gray-900">{group.groupName}</h3>
                            </div>
                            <p className="text-indigo-600 font-bold mb-3">{group.therapist}</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-sm text-gray-500 mb-4">
                                <p><i className="fas fa-map-marker-alt mr-2 w-4"></i>{group.county}</p>
                                <p className={group.email === "[Awaiting Response]" ? "text-amber-600 font-bold" : ""}><i className="fas fa-envelope mr-2 w-4"></i>{group.email}</p>
                                <p><i className="fas fa-info-circle mr-2 w-4"></i>{group.status}</p>
                            </div>

                            <div className="flex flex-col sm:flex-row gap-2">
                                {isEmailed ? (
                                    <button onClick={() => updateGroupInCloud({...group, lastContacted: ""})} className="text-xs text-gray-400 font-bold uppercase hover:underline">Undo Outreach Mark</button>
                                ) : (
                                    <button onClick={() => toggleExpand(group)} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-indigo-700 flex items-center gap-2">
                                        Send Email Verify <i className={`fas ${isExpanded ? 'fa-chevron-up' : 'fa-chevron-down'}`}></i>
                                    </button>
                                )}
                                {isEmailed && <span className="text-emerald-600 font-bold text-xs self-center">Emailed on {group.lastContacted}</span>}
                            </div>
                          </div>

                          {isExpanded && (
                            <div className="border-t border-gray-100 bg-gray-50 p-6 rounded-b-2xl">
                                <h4 className="font-bold text-gray-700 mb-4 text-lg">Email Draft</h4>
                                <div className="mb-4">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">To:</label>
                                    <div className="flex">
                                        <input type="text" readOnly value={group.email} className="flex-1 p-3 bg-white border border-gray-300 rounded-l-lg font-medium"/>
                                        <button onClick={() => copyToClipboard(group.email, 'email', group.id)} className={`px-4 py-3 font-bold rounded-r-lg transition-colors ${copiedEmailId === group.id ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-800'}`}>
                                            {copiedEmailId === group.id ? 'Copied!' : 'Copy'}
                                        </button>
                                    </div>
                                </div>
                                <div className="mb-6 relative">
                                    <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Message:</label>
                                    <textarea readOnly value={message} rows={6} className="w-full p-4 bg-white border border-gray-300 rounded-lg text-gray-800 leading-relaxed resize-none"></textarea>
                                    <button onClick={() => copyToClipboard(message, 'message', group.id)} className={`absolute bottom-4 right-4 px-4 py-2 font-bold rounded-lg ${copiedMessageId === group.id ? 'bg-green-500 text-white' : 'bg-indigo-100 text-indigo-800'}`}>
                                        {copiedMessageId === group.id ? 'Message Copied!' : 'Copy Message'}
                                    </button>
                                </div>
                                <button onClick={() => handleMarkEmailed(group)} className="w-full py-3 bg-emerald-500 text-white font-bold rounded-lg shadow-md hover:bg-emerald-600 transition-transform active:scale-95">
                                    <i className="fas fa-check-circle mr-2"></i> Mark as Emailed & Sent
                                </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </main>

              {/* MODAL FORMS */}
              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white p-8 rounded-3xl w-full max-w-xl shadow-2xl">
                    <h2 className="text-2xl font-black mb-6 text-indigo-900">{showEditForm ? 'Edit Lead' : 'Add New Lead'}</h2>
                    <form onSubmit={e => {e.preventDefault(); handleSaveSubmit(e, showEditForm ? 'edit' : 'add');}} className="space-y-4">
                        <div><label className="text-xs font-bold text-gray-400 uppercase">Group Name</label><input required className="w-full p-3 border border-gray-200 rounded-xl" value={currentGroup.groupName || ""} onChange={e => setCurrentGroup({...currentGroup, groupName:e.target.value})} /></div>
                        <div><label className="text-xs font-bold text-gray-400 uppercase">Therapist</label><input required className="w-full p-3 border border-gray-200 rounded-xl" value={currentGroup.therapist || ""} onChange={e => setCurrentGroup({...currentGroup, therapist:e.target.value})} /></div>
                        <div><label className="text-xs font-bold text-indigo-600 uppercase">Email (Update when replied)</label><input className="w-full p-3 border-2 border-indigo-100 rounded-xl" value={currentGroup.email || ""} onChange={e => setCurrentGroup({...currentGroup, email:e.target.value})} /></div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-gray-400 uppercase">Status</label><select className="w-full p-3 border border-gray-200 rounded-xl bg-white" value={currentGroup.status || "Pending"} onChange={e => setCurrentGroup({...currentGroup, status:e.target.value})}><option>Pending</option><option>Verified</option></select></div>
                            <div><label className="text-xs font-bold text-gray-400 uppercase">County</label><input className="w-full p-3 border border-gray-200 rounded-xl" value={currentGroup.county || ""} onChange={e => setCurrentGroup({...currentGroup, county:e.target.value})} /></div>
                        </div>
                        <div className="flex gap-4 pt-6">
                            <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="flex-1 p-3 font-bold text-gray-400">Cancel</button>
                            <button type="submit" className="flex-1 bg-indigo-600 text-white p-3 rounded-xl font-bold">Save to Cloud</button>
                        </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
