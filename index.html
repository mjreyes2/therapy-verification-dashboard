<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tampa Bay Therapist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069"; // YOUR PIN
          
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [pinError, setPinError] = useState(false);

          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");

          const loadData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(SCRIPT_URL);
              const result = await response.json();
              setData(result);
            } catch (error) { console.error("Error fetching database:", error); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const currentMonthYear = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
          const [checkedOffIds, setCheckedOffIds] = useState([]);
          const [isMonthComplete, setIsMonthComplete] = useState(false);
          const [expandedGroupId, setExpandedGroupId] = useState(null);
          const [copiedEmailId, setCopiedEmailId] = useState(null);
          const [copiedMessageId, setCopiedMessageId] = useState(null);

          useEffect(() => {
            const savedProgress = localStorage.getItem('marvinVerificationData');
            if (savedProgress) {
              const parsedData = JSON.parse(savedProgress);
              if (parsedData.month === currentMonthYear) {
                setCheckedOffIds(parsedData.checkedOffIds || []);
                setIsMonthComplete(parsedData.isMonthComplete || false);
              }
            }
          }, [currentMonthYear]);

          useEffect(() => {
            localStorage.setItem('marvinVerificationData', JSON.stringify({ month: currentMonthYear, checkedOffIds, isMonthComplete }));
          }, [checkedOffIds, isMonthComplete, currentMonthYear]);

          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({
            id: null, groupName: "", therapist: "", county: "Pinellas", modality: "In-Person", type: "Open", email: "", cost: "", schedule: "", keywords: "", language: "English"
          });

          const openAddForm = () => {
            setCurrentGroup({ id: null, groupName: "", therapist: "", county: "Pinellas", modality: "In-Person", type: "Open", email: "", cost: "", schedule: "", keywords: "", language: "English" });
            setShowAddForm(true);
          };

          const openEditForm = (group) => {
            setCurrentGroup({
              ...group, 
              keywords: group.keywords || "", 
              language: group.language || "English"
            });
            setShowEditForm(true);
          };

          const handleSaveSubmit = async (e, actionType) => {
            e.preventDefault();
            setIsSaving(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: actionType, data: currentGroup }) });
              await loadData();
              setShowAddForm(false);
              setShowEditForm(false);
            } catch (error) { alert(`Error saving group.`); }
            setIsSaving(false);
          };

          const handleDelete = async (id, groupName) => {
            if (window.confirm(`Are you sure you want to completely delete "${groupName}"?`)) {
              setIsSaving(true);
              try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
                await loadData();
              } catch (error) { alert("Error deleting group."); }
              setIsSaving(false);
            }
          };

          const copyToClipboard = (text, type, id) => {
            const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea); textArea.select();
            try {
              document.execCommand('copy');
              if (type === 'email') { setCopiedEmailId(id); setTimeout(() => setCopiedEmailId(null), 2000); } 
              else { setCopiedMessageId(id); setTimeout(() => setCopiedMessageId(null), 2000); }
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const handleLogin = (e) => {
            e.preventDefault();
            if (pinInput === CORRECT_PIN) { setIsAuthenticated(true); sessionStorage.setItem('tbta_auth', 'true'); setPinError(false); } 
            else { setPinError(true); setPinInput(""); }
          };
          const handleLogout = () => { setIsAuthenticated(false); sessionStorage.removeItem('tbta_auth'); setPinInput(""); };
          const toggleExpand = (id) => setExpandedGroupId(expandedGroupId === id ? null : id);
          const markAsEmailed = (id) => { if (!checkedOffIds.includes(id)) setCheckedOffIds([...checkedOffIds, id]); setExpandedGroupId(null); };
          const undoEmailed = (id) => { setCheckedOffIds(checkedOffIds.filter(checkedId => checkedId !== id)); setIsMonthComplete(false); };
          const handleCompleteMonth = () => { setIsMonthComplete(true); window.scrollTo({ top: 0, behavior: 'smooth' }); };

          // ✨ THE UPGRADED SEARCH ENGINE ✨
          const filteredData = useMemo(() => {
            if (!searchTerm) return data;
            const lowerTerm = searchTerm.toLowerCase();
            return data.filter(group => {
              return (
                (group.groupName || "").toLowerCase().includes(lowerTerm) || 
                (group.therapist || "").toLowerCase().includes(lowerTerm) ||
                (group.county || "").toLowerCase().includes(lowerTerm) ||
                (group.keywords || "").toLowerCase().includes(lowerTerm) ||
                (group.language || "").toLowerCase().includes(lowerTerm) ||
                (group.cost || "").toLowerCase().includes(lowerTerm) ||
                (group.modality || "").toLowerCase().includes(lowerTerm)
              );
            });
          }, [data, searchTerm]);

          const getMessageTemplate = (therapistName, groupName) => {
            const nameStr = therapistName ? therapistName.split(',')[0].trim() : "Provider"; 
            return `Hello ${nameStr},\n\nMy name is Marvin, I am a local mental health therapist working for Tampa Bay Therapist and Associates.\n\nI am looking to inquire about your group: ${groupName}. Are you currently accepting new clients for referrals to this group?\n\nCould you also please confirm if this is an open or closed group, and if there are any updates to your schedule or fees?\n\nThank you,\nMarvin`;
          };

          const progressPercentage = data.length > 0 ? Math.round((checkedOffIds.length / data.length) * 100) : 0;
          const allChecked = checkedOffIds.length === data.length && data.length > 0;
          const showBlinkingAlert = !isMonthComplete;

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-indigo-600">
                  <div className="text-center mb-6">
                    <i className="fas fa-lock text-4xl text-indigo-600 mb-3"></i>
                    <h2 className="text-2xl font-bold text-gray-800">Secure Access</h2>
                    <p className="text-gray-500 text-sm mt-1">Tampa Bay Therapist & Associates Internal Directory</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <input type="password" maxLength="4" autoFocus value={pinInput} onChange={(e) => setPinInput(e.target.value)} className={`w-full px-4 py-3 text-center text-2xl tracking-[0.5em] border rounded-lg focus:outline-none focus:ring-2 ${pinError ? 'border-red-500 focus:ring-red-500' : 'border-gray-300 focus:ring-indigo-500'}`} placeholder="••••" />
                      {pinError && <p className="text-red-500 text-sm mt-2 text-center font-medium">Incorrect PIN. Please try again.</p>}
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200">Access Dashboard</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="relative min-h-screen">
              {isSaving && (
                <div className="fixed inset-0 bg-white bg-opacity-80 z-50 flex flex-col items-center justify-center">
                  <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
                  <h2 className="text-xl font-bold text-gray-800">Syncing with Google Database...</h2>
                </div>
              )}

              <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                  <div>
                    <h1 className="text-2xl font-bold text-indigo-800 flex items-center gap-2">
                      <i className="fas fa-users text-indigo-600"></i>
                      Tampa Bay Therapist & Associates
                    </h1>
                    <p className="text-sm text-gray-500 font-medium flex items-center gap-2">
                      Internal Directory <span className="text-green-500 text-xs"><i className="fas fa-circle"></i> Live Sync Active</span>
                    </p>
                  </div>
                  <div>
                    <button onClick={handleLogout} className="text-sm text-gray-500 hover:text-red-600 font-medium transition-colors">
                      <i className="fas fa-sign-out-alt mr-1"></i> Lock System
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                {showBlinkingAlert && (
                  <div className="bg-red-600 text-white p-5 animate-pulse flex flex-col sm:flex-row justify-between items-center text-lg sm:text-xl font-extrabold rounded-lg mb-8 border-4 border-red-800 shadow-2xl tracking-wide text-center sm:text-left gap-4">
                    <div className="flex items-center gap-3"><i className="fas fa-exclamation-triangle text-3xl"></i><span>URGENT: SEND OUT MONTHLY VERIFICATION EMAILS FOR {currentMonthYear.toUpperCase()}!</span></div>
                  </div>
                )}

                <div className="bg-white rounded-lg shadow-md border border-gray-200 p-6 mb-8">
                  <div className="flex justify-between items-end mb-2">
                    <div>
                      <h2 className="text-lg font-bold text-gray-800">Monthly Email Progress</h2>
                      <p className="text-sm text-gray-500">Track your verification emails for {currentMonthYear}</p>
                    </div>
                    <div className="text-2xl font-black text-indigo-600">{checkedOffIds.length} / {data.length}</div>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-4 mb-4">
                    <div className="bg-indigo-600 h-4 rounded-full transition-all duration-500 ease-out" style={{ width: `${progressPercentage}%` }}></div>
                  </div>
                </div>

                {/* SEARCH BAR */}
                <div className="flex flex-col sm:flex-row gap-4 mb-6">
                  <div className="relative flex-1 shadow-sm">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i className="fas fa-search text-gray-400"></i></div>
                    <input type="text" className="block w-full pl-11 pr-3 py-4 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg" placeholder="Search trauma, teens, virtual, Spanish, cost..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                  </div>
                  <button onClick={openAddForm} className="px-6 py-4 bg-indigo-800 hover:bg-indigo-900 text-white font-bold rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors cursor-pointer whitespace-nowrap">
                    <i className="fas fa-plus"></i> Add Group
                  </button>
                </div>

                {/* ADD/EDIT FORM WITH KEYWORDS AND LANGUAGE */}
                {(showAddForm || showEditForm) && (
                  <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
                      <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <h2 className="text-2xl font-bold text-gray-800">{showEditForm ? 'Edit Directory Group' : 'Add New Directory Group'}</h2>
                        <button onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
                      </div>
                      <form onSubmit={(e) => handleSaveSubmit(e, showEditForm ? 'edit' : 'add')} className="space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div className="sm:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Group Name *</label><input required type="text" value={currentGroup.groupName} onChange={e => setCurrentGroup({...currentGroup, groupName: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Therapist/Provider *</label><input required type="text" value={currentGroup.therapist} onChange={e => setCurrentGroup({...currentGroup, therapist: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Provider Email *</label><input required type="text" value={currentGroup.email} onChange={e => setCurrentGroup({...currentGroup, email: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">County/Location *</label><input required type="text" value={currentGroup.county} onChange={e => setCurrentGroup({...currentGroup, county: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Language Support</label><select value={currentGroup.language} onChange={e => setCurrentGroup({...currentGroup, language: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500"><option>English</option><option>Spanish</option><option>Bilingual (Eng/Spa)</option><option>Other</option></select></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Modality</label><select value={currentGroup.modality} onChange={e => setCurrentGroup({...currentGroup, modality: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500"><option>In-Person</option><option>Virtual</option><option>Hybrid</option></select></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Group Type</label><select value={currentGroup.type} onChange={e => setCurrentGroup({...currentGroup, type: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500"><option>Open</option><option>Closed</option><option>Rolling</option></select></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Cost / Insurance</label><input type="text" value={currentGroup.cost} onChange={e => setCurrentGroup({...currentGroup, cost: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div><label className="block text-sm font-medium text-gray-700 mb-1">Schedule</label><input type="text" value={currentGroup.schedule} onChange={e => setCurrentGroup({...currentGroup, schedule: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" /></div>
                          <div className="sm:col-span-2">
                            <label className="block text-sm font-medium text-gray-700 mb-1">Search Keywords (comma separated)</label>
                            <input type="text" placeholder="e.g. trauma, OCD, teens, adults, anxiety" value={currentGroup.keywords} onChange={e => setCurrentGroup({...currentGroup, keywords: e.target.value})} className="w-full p-2 border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" />
                            <p className="text-xs text-gray-500 mt-1">Typing these keywords in the search bar will pull up this group.</p>
                          </div>
                        </div>
                        <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                          <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded font-medium">Cancel</button>
                          <button type="submit" className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded font-bold">{showEditForm ? 'Save Changes' : 'Save Group to Database'}</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* LIST RENDER */}
                {isLoading ? (
                  <div className="bg-white p-16 rounded-lg border border-gray-200 text-center shadow-sm">
                    <i className="fas fa-spinner fa-spin text-5xl text-indigo-500 mb-4"></i>
                    <h3 className="text-xl font-bold text-gray-800">Fetching live database...</h3>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {filteredData.length > 0 ? (
                      filteredData.map((group) => {
                        const isCheckedOff = checkedOffIds.includes(group.id);
                        const isExpanded = expandedGroupId === group.id;
                        const message = getMessageTemplate(group.therapist, group.groupName);
                        // Display badge if language is not English
                        const isSpanish = group.language && group.language.toLowerCase().includes('span');

                        return (
                          <div key={group.id} className={`bg-white rounded-lg border-2 shadow-sm transition-all duration-200 relative ${isCheckedOff ? 'border-green-300 opacity-60 bg-green-50' : 'border-gray-200 hover:border-indigo-300'}`}>
                            
                            <div className="absolute top-4 right-4 flex gap-3 z-10">
                              <button onClick={() => openEditForm(group)} className="text-gray-400 hover:text-indigo-600 transition-colors p-1" title="Edit Group"><i className="fas fa-edit text-lg"></i></button>
                              <button onClick={() => handleDelete(group.id, group.groupName)} className="text-gray-400 hover:text-red-500 transition-colors p-1" title="Delete from Database"><i className="fas fa-trash-alt text-lg"></i></button>
                            </div>

                            <div className="p-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 pr-20">
                              <div className="flex-1 w-full">
                                <div className="flex flex-wrap items-center gap-2 mb-1">
                                  {isCheckedOff && <i className="fas fa-check-circle text-green-500 text-xl"></i>}
                                  <h3 className={`text-xl font-bold ${isCheckedOff ? 'text-green-800 line-through' : 'text-gray-900'}`}>{group.groupName}</h3>
                                  {isSpanish && <span className="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded border border-blue-200"><i className="fas fa-globe-americas"></i> {group.language}</span>}
                                </div>
                                <p className="text-gray-600 font-medium mt-1">Therapist/Provider: <span className="text-gray-900 font-bold">{group.therapist}</span></p>
                                <div className="flex flex-wrap items-center gap-4 mt-3 text-sm text-gray-600">
                                  <span className="flex items-center"><i className="fas fa-map-marker-alt mr-1"></i> {group.county}</span>
                                  <span className="flex items-center"><i className="fas fa-video mr-1"></i> {group.modality}</span>
                                  <span className="flex items-center"><i className="fas fa-dollar-sign mr-1"></i> {group.cost}</span>
                                </div>
                                {group.keywords && <p className="text-xs text-gray-400 mt-2 font-medium italic"><i className="fas fa-tags mr-1"></i> Tags: {group.keywords}</p>}
                                <p className="text-sm text-gray-500 mt-2"><i className="far fa-clock mr-1"></i> {group.schedule}</p>
                              </div>

                              <div className="flex flex-col sm:flex-row gap-2 w-full sm:w-auto mt-4 sm:mt-0">
                                {isCheckedOff ? (
                                  <button onClick={() => undoEmailed(group.id)} className="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-md hover:bg-gray-100 text-sm font-medium w-full sm:w-auto cursor-pointer">Undo</button>
                                ) : (
                                  <button onClick={() => toggleExpand(group.id)} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-bold shadow flex items-center justify-center gap-2 w-full sm:w-auto transition-colors cursor-pointer">Send Email Verify <i className={`fas ${isExpanded ? 'fa-chevron-up' : 'fa-chevron-down'}`}></i></button>
                                )}
                              </div>
                            </div>

                            {isExpanded && !isCheckedOff && (
                              <div className="border-t border-gray-200 bg-gray-50 p-5 rounded-b-lg">
                                <h4 className="font-bold text-gray-800 mb-3 text-lg">Email Draft</h4>
                                <div className="mb-4">
                                  <div className="flex">
                                    <input type="text" readOnly value={group.email} className="flex-1 p-3 bg-white border border-gray-300 rounded-l-md text-gray-800 font-medium"/>
                                    <button onClick={() => copyToClipboard(group.email, 'email', group.id)} className={`px-4 py-3 flex items-center justify-center font-bold rounded-r-md transition-colors cursor-pointer ${copiedEmailId === group.id ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300 text-gray-800'}`}>
                                      {copiedEmailId === group.id ? <><i className="fas fa-check mr-1"></i> Copied!</> : <><i className="far fa-copy mr-1"></i> Copy Email</>}
                                    </button>
                                  </div>
                                </div>
                                <div className="mb-6">
                                  <div className="relative">
                                    <textarea readOnly value={message} rows={8} className="w-full p-4 bg-white border border-gray-300 rounded-md text-gray-800 leading-relaxed font-medium resize-none"></textarea>
                                    <div className="absolute bottom-4 right-4">
                                      <button onClick={() => copyToClipboard(message, 'message', group.id)} className={`px-4 py-2 flex items-center font-bold shadow-sm rounded-md transition-colors cursor-pointer ${copiedMessageId === group.id ? 'bg-green-500 text-white' : 'bg-indigo-100 hover:bg-indigo-200 text-indigo-800'}`}>
                                        {copiedMessageId === group.id ? <><i className="fas fa-check mr-1"></i> Copied!</> : <><i className="far fa-copy mr-1"></i> Copy Message</>}
                                      </button>
                                    </div>
                                  </div>
                                </div>
                                <div className="flex items-center justify-between pt-4 border-t border-gray-200">
                                  <button onClick={() => markAsEmailed(group.id)} className="px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-md shadow-md flex items-center gap-2 text-lg transition-transform active:scale-95 cursor-pointer">
                                    <i className="fas fa-check-circle text-xl"></i> Mark as Emailed
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })
                    ) : (
                      <div className="bg-white p-12 rounded-lg border border-gray-200 text-center">
                        <i className="fas fa-folder-open text-4xl text-gray-300 mb-4"></i>
                        <h3 className="text-xl font-bold text-gray-700">No Groups Found</h3>
                        <p className="text-gray-500">Try a different search term or add a new group!</p>
                      </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
