<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>TBTA Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulseGlow {
            0% { border-color: #6366f1; box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
            50% { border-color: #818cf8; box-shadow: 0 0 20px rgba(99, 102, 241, 0.6); }
            100% { border-color: #6366f1; box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
        }
        .priority-lead { 
            animation: pulseGlow 2s infinite ease-in-out; 
            border-width: 3px !important; 
            background-color: #f8faff !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweycjLZOjcVxXnK_GyxkcAdAo3dCbFUz0ezNb35fzpfYb5kB108wY2SO9VZt2I4NMYRQ/exec";

        function App() {
          const CORRECT_PIN = "8069"; 
          
          const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('tbta_auth') === 'true');
          const [pinInput, setPinInput] = useState("");
          const [data, setData] = useState([]);
          const [isLoading, setIsLoading] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [showAddForm, setShowAddForm] = useState(false);
          const [showEditForm, setShowEditForm] = useState(false);
          const [currentGroup, setCurrentGroup] = useState({});
          const [expandedId, setExpandedId] = useState(null);
          const [copiedType, setCopiedType] = useState(null);

          const loadData = async () => {
            setIsLoading(true);
            try {
              const res = await fetch(SCRIPT_URL);
              const json = await res.json();
              setData(json);
            } catch (e) { console.error(e); }
            setIsLoading(false);
          };

          useEffect(() => { if (isAuthenticated) loadData(); }, [isAuthenticated]);

          const updateCloud = async (group, action = "edit") => {
            setIsLoading(true);
            try {
              await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action, data: group }) });
              await loadData();
            } catch (e) { alert("Sync Error"); }
            setIsLoading(false);
          };

          const handleCopy = (text, type) => {
            navigator.clipboard.writeText(text);
            setCopiedType(type);
            setTimeout(() => setCopiedType(null), 2000);
          };

          const getEmailDraft = (g) => {
            const firstName = g.therapist ? g.therapist.split(' ')[0] : "Provider";
            return `Hello ${firstName},\n\nMy name is Marvin, I am a local mental health therapist working for Tampa Bay Therapist and Associates.\n\nI am looking to inquire about your group: ${g.groupName}. Are you currently accepting new clients for referrals to this group?\n\nCould you also please confirm if this is an open or closed group, and if there are any updates to your schedule or fees?\n\nThank you,\nMarvin`;
          };

          const processedData = useMemo(() => {
            const filtered = data.filter(g => 
              (g.groupName || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
              (g.therapist || "").toLowerCase().includes(searchTerm.toLowerCase())
            );
            return [...filtered].sort((a, b) => {
                const aNew = !a.viewed || String(a.viewed).toLowerCase() === 'false';
                const bNew = !b.viewed || String(b.viewed).toLowerCase() === 'false';
                if (aNew && !bNew) return -1;
                if (!aNew && bNew) return 1;
                return 0;
            });
          }, [data, searchTerm]);

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border-t-8 border-indigo-600">
                  <h2 className="text-2xl font-black text-center mb-6">TBTA SECURITY</h2>
                  <form onSubmit={(e) => { e.preventDefault(); if(pinInput === CORRECT_PIN) { setIsAuthenticated(true); sessionStorage.setItem('tbta_auth', 'true'); } }} className="space-y-4">
                    <input type="password" maxLength="4" autoFocus value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full p-4 text-center text-3xl tracking-widest border rounded-xl" placeholder="••••" />
                    <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl">LOGIN</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="max-w-4xl mx-auto p-4 sm:p-8">
              {isLoading && (
                <div className="fixed inset-0 bg-white/80 z-[100] flex flex-col items-center justify-center font-black text-indigo-600">
                  <i className="fas fa-circle-notch fa-spin text-6xl mb-4"></i>
                  <span>SYNCING...</span>
                </div>
              )}
              
              <div className="flex justify-between items-center mb-8">
                <div>
                  <h1 className="text-2xl font-black text-indigo-900 uppercase">Tampa Bay Therapist & Associates</h1>
                  <p className="text-sm font-bold text-slate-400">Referral Triage ● Sync: Live</p>
                </div>
                <button onClick={() => { setCurrentGroup({groupName:"", therapist:"", email:"[Awaiting Response]", viewed:"false", status:"Pending"}); setShowAddForm(true); }} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">+ NEW LEAD</button>
              </div>

              <input type="text" placeholder="Search..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-5 border-2 border-white rounded-2xl shadow-sm mb-10 text-lg outline-none focus:border-indigo-400" />

              <div className="space-y-6">
                {processedData.map(group => {
                  const isNew = !group.viewed || String(group.viewed).toLowerCase() === 'false';
                  const isExpanded = expandedId === group.id;
                  const isContacted = !!group.lastContacted;

                  return (
                    <div key={group.id} className={`bg-white rounded-[1.5rem] border-2 transition-all relative ${isNew ? 'priority-lead' : 'border-white shadow-sm hover:border-indigo-100'} ${isContacted ? 'bg-emerald-50/20' : ''}`}>
                      <div className="p-6 cursor-pointer" onClick={() => { setExpandedId(isExpanded ? null : group.id); if(isNew) updateCloud({...group, viewed:"true"}); }}>
                        <div className="flex justify-between items-start pr-12">
                          <div>
                            <div className="flex items-center gap-2 mb-1">
                                {isNew && <span className="bg-indigo-600 text-white text-[8px] px-2 py-0.5 rounded font-black uppercase">New</span>}
                                <h3 className="text-xl font-black text-slate-800">{group.groupName}</h3>
                            </div>
                            <p className="font-bold text-indigo-600">{group.therapist}</p>
                          </div>
                          <div className="flex gap-3">
                            <button onClick={(e) => {e.stopPropagation(); setCurrentGroup(group); setShowEditForm(true);}} className="text-slate-300 hover:text-indigo-600"><i className="fas fa-edit"></i></button>
                            <button onClick={(e) => {e.stopPropagation(); if(confirm("Delete?")) updateCloud(group, "delete");}} className="text-slate-300 hover:text-red-500"><i className="fas fa-trash"></i></button>
                          </div>
                        </div>

                        {isExpanded && (
                          <div className="mt-6 pt-6 border-t border-slate-50 space-y-6 animate-in fade-in duration-300">
                            <div className="grid grid-cols-2 gap-4 text-sm">
                                <p><strong>County:</strong> {group.county}</p>
                                <p><strong>Modality:</strong> {group.modality}</p>
                                <p><strong>Status:</strong> {group.status}</p>
                                <p><strong>Last Contact:</strong> {group.lastContacted || "Never"}</p>
                            </div>

                            {/* EMAIL SECTION */}
                            <div className="bg-slate-50 p-4 rounded-xl space-y-4">
                                <h4 className="text-xs font-black uppercase text-slate-400">Outreach Draft</h4>
                                <div>
                                    <label className="text-[10px] font-bold text-indigo-600">RECIPIENT EMAIL</label>
                                    <div className="flex gap-2">
                                        <input readOnly value={group.email} className="flex-1 bg-white border p-2 rounded text-sm font-bold" />
                                        <button onClick={(e) => {e.stopPropagation(); handleCopy(group.email, 'email-'+group.id);}} className="bg-indigo-100 text-indigo-700 px-3 rounded font-bold text-xs">{copiedType === 'email-'+group.id ? 'Copied!' : 'Copy'}</button>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-indigo-600">MESSAGE</label>
                                    <textarea readOnly value={getEmailDraft(group)} className="w-full bg-white border p-2 rounded text-xs h-32 resize-none leading-relaxed" />
                                    <button onClick={(e) => {e.stopPropagation(); handleCopy(getEmailDraft(group), 'msg-'+group.id);}} className="w-full mt-2 bg-indigo-600 text-white py-2 rounded font-bold text-xs">{copiedType === 'msg-'+group.id ? 'Message Copied!' : 'Copy Message Draft'}</button>
                                </div>
                                <button onClick={(e) => {e.stopPropagation(); updateCloud({...group, lastContacted: new Date().toLocaleDateString()}); }} className="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Mark as Emailed Today</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* MODAL FORM */}
              {(showAddForm || showEditForm) && (
                <div className="fixed inset-0 bg-slate-900/60 z-[90] flex items-center justify-center p-4">
                  <div className="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
                    <h2 className="text-xl font-black mb-6">{showEditForm ? 'Edit Lead' : 'New Lead'}</h2>
                    <form onSubmit={e => {e.preventDefault(); updateCloud(currentGroup, showEditForm ? 'edit' : 'add'); setShowAddForm(false); setShowEditForm(false);}} className="space-y-4">
                        <input className="w-full p-4 bg-slate-50 rounded-xl" placeholder="Group Name" value={currentGroup.groupName || ""} onChange={e => setCurrentGroup({...currentGroup, groupName:e.target.value})} required />
                        <input className="w-full p-4 bg-slate-50 rounded-xl" placeholder="Therapist" value={currentGroup.therapist || ""} onChange={e => setCurrentGroup({...currentGroup, therapist:e.target.value})} required />
                        <input className="w-full p-4 border-2 border-indigo-100 rounded-xl font-bold" placeholder="Email" value={currentGroup.email || ""} onChange={e => setCurrentGroup({...currentGroup, email:e.target.value})} />
                        <div className="grid grid-cols-2 gap-4">
                            <select className="p-4 bg-slate-50 rounded-xl" value={currentGroup.status || "Pending"} onChange={e => setCurrentGroup({...currentGroup, status:e.target.value})}><option>Pending</option><option>Verified</option></select>
                            <input className="p-4 bg-slate-50 rounded-xl" placeholder="County" value={currentGroup.county || ""} onChange={e => setCurrentGroup({...currentGroup, county:e.target.value})} />
                        </div>
                        <div className="flex gap-4 pt-4">
                            <button type="button" onClick={() => {setShowAddForm(false); setShowEditForm(false);}} className="flex-1 font-bold text-slate-400">Cancel</button>
                            <button type="submit" className="flex-1 bg-indigo-600 text-white p-4 rounded-xl font-bold">Save</button>
                        </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
